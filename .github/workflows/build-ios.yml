name: Build iOS Client (IPA)

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile & Pack IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Xcode Project (Unsigned)
        run: |
          xcodebuild -project ios-client/ios-client.xcodeproj \
                     -scheme ios-client \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGN_IDENTITY="-" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=YES \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     SYMROOT=../build \
                     clean build

      - name: Package app into IPA
        run: |
          mkdir -p ios-client/Payload
          cp -r ios-client/build/Release-iphoneos/ios-client.app ios-client/Payload/
          cd ios-client
          zip -r ios-client.ipa Payload
          cd ..

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-client-ipa
          path: ios-client/ios-client.ipa
          if-no-files-found: error

      - name: Create Release and Upload IPA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v1.0.0 --title "v1.0.0" --notes "Automated iOS client build" --clobber || true
          gh release upload v1.0.0 ios-client/ios-client.ipa --clobber
