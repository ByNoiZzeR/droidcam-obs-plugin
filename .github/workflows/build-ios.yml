name: Build iOS Client (IPA)

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile & Pack IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Xcode Project (Unsigned)
        run: |
          xcodebuild -project ios-client/ios-client.xcodeproj \
                     -scheme ios-client \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGN_IDENTITY="-" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=YES \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     SYMROOT=../build \
                     clean build > build.log 2>&1

      - name: Commit and Push Build Log on Failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add build.log
          git commit -m "Xcode build log from failed run"
          git push origin HEAD:build-failed-log --force


      - name: Upload Build Log Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build.log
          if-no-files-found: ignore

      - name: Package app into IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/ios-client.app Payload/
          zip -r ios-client.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-client-ipa
          path: ios-client.ipa
          if-no-files-found: error

      - name: Create Release and Upload IPA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v1.0.0 --title "v1.0.0" --notes "Automated iOS client build" --clobber || true
          gh release upload v1.0.0 ios-client.ipa --clobber || true

